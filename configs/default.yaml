project_name: avo-evolution
workspace_dir: ./workspace
solution_file: solution.py
seed_file: ""

max_versions: 100
max_wall_time_hours: 168.0
max_agent_steps_per_variation: 50

llm:
  provider: openai
  model: gpt-4o
  api_key: ""
  base_url: ""
  temperature: 0.7
  max_tokens: 16384
  timeout: 120.0

supervisor:
  enabled: true
  max_failed_attempts: 10
  stall_window: 5
  cycle_detection_window: 8
  redirect_with_llm: true

knowledge_base_dir: ""
scoring_module: ""
scoring_class: Scorer

git_persist: true
log_dir: ./logs
log_level: INFO
verbose: false
